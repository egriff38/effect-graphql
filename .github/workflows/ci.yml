name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: API reference (docgen)
        run: bun run docgen

      - name: Lint prose (Vale)
        uses: errata-ai/vale-action@reviewdog
        with:
          # Only errors block CI; warnings show as review comments.
          fail_on_error: true
          reporter: github-pr-review
          files: 'packages/docs packages/core/README.md README.md'

      - name: Package (dry-run)
        working-directory: packages/core
        run: npm pack --dry-run
