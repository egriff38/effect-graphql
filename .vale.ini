# Vale — prose linter for docs.
#
# Scoped to Markdown under `packages/docs/` plus top-level READMEs. Excludes:
#   - `packages/core/docs/adr/**` — historical design records, not prose
#   - `packages/docs/_templates/**` — templates contain intentional
#     anti-pattern examples that would trip AiSlop rules
#   - `packages/docs/_prompt.md` — same reason (quotes banned phrases)
#
# Style packs:
#   - Microsoft:  developer-docs style guide (published, mature)
#   - Google:     tone rules
#   - write-good: passive voice, weasel words, wordiness
#   - alex:       inclusive-language backstop
#   - AiSlop:     hand-rolled slop taxonomy (see styles/AiSlop/)
#
# Update by running `vale sync` at the repo root; only AiSlop is hand-authored.

StylesPath = styles
MinAlertLevel = warning

Packages = Microsoft, Google, write-good, alex

Vocab = effect-graphql

[*.md]
BasedOnStyles = Microsoft, Google, write-good, alex, AiSlop

# ── House-style overrides ────────────────────────────────────────────────────
# Style calls, not slop. Each disable requires a rationale.

# Contractions are fine — matches Effect ecosystem voice.
Microsoft.Contractions = NO

# `Microsoft.We` collides with `alex` on gendered-language checks; alex wins.
Microsoft.We = NO

# House style: spaced em-dashes (` — `). Consistent with Effect's own docs
# and readable in plain-text terminals.
Microsoft.Dashes = NO
Google.EmDash = NO

# Prefer `auto-generated` (hyphenated) over `autogenerated`.
Microsoft.Auto = NO

# Developer docs use acronyms freely (RPC, HTTP, PR, CI). No point banning
# them in headings when the audience knows what they mean.
Microsoft.HeadingAcronyms = NO

# American-style punctuation-inside-quotes trips constantly on inline `code`
# tokens that happen to sit next to a comma. The rule is stylistic, not
# semantic — turn it off; reviewers catch real punctuation issues.
Microsoft.Quotes = NO
Google.Quotes = NO

# Intentional pedagogical files that quote banned patterns as examples.
[**/_prompt.md]
BasedOnStyles =
[**/_templates/*.md]
BasedOnStyles =
